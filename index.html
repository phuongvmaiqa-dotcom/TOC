<script type="module">
import React from 'https://esm.sh/react@18.2.0';
import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
import {
  LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
  ReferenceLine, Scatter, ComposedChart
} from 'https://esm.sh/recharts@2.10.3?deps=react@18.2.0,react-dom@18.2.0';
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const h = React.createElement;
const { useState, useEffect, useMemo, useCallback, useRef, Fragment } = React;

// ============================================================
// CẤU HÌNH SUPABASE — sửa 2 dòng dưới nếu bạn đổi project Supabase
// ============================================================
const SUPABASE_URL = 'https://fegayqatcpmvbuuzzjzw.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_BrE8lu-Qjj4uA-auK4T5jw_7Q_uNUOF';

// SỬA dòng dưới thành domain n8n thật của bạn + đúng path webhook
const N8N_REPORT_WEBHOOK_URL = 'https://n8n.cpc1hn.com/webhook/toc-report-webhook';

const REST_BASE = `${SUPABASE_URL}/rest/v1`;

// Client dùng riêng cho Auth (login/logout/đổi mật khẩu/quên mật khẩu)
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

// Headers cho các request REST tới PostgREST.
// Khi có accessToken (đã đăng nhập) -> gửi kèm để RLS nhận diện role "authenticated".
// Nếu không có -> fallback về anon key (sẽ bị RLS chặn nếu bạn đã bật policy yêu cầu đăng nhập).
function buildHeaders(accessToken) {
  return {
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${accessToken || SUPABASE_ANON_KEY}`,
  };
}

// ============================================================
// CẤU HÌNH HIỂN THỊ
// ============================================================
const WATER_TYPES = [
  { key: 'distilled', label: 'Nước cất (Distilled Water)', accent: '#2563eb' },
  { key: 'purified', label: 'Nước tinh khiết (Purified Water)', accent: '#0891b2' },
];

const METRICS = [
  { key: 'toc', label: 'TOC', unit: 'ppb', hasSpec: true },
  { key: 'conductivity', label: 'Độ dẫn điện', unit: 'µS/cm', hasSpec: false },
  { key: 'temperature', label: 'Nhiệt độ', unit: '°C', hasSpec: false },
];

const RANGE_PRESETS = [
  { key: '24h', label: '24 giờ', hours: 24 },
  { key: '7d', label: '7 ngày', hours: 24 * 7 },
  { key: '30d', label: '30 ngày', hours: 24 * 30 },
];

// Ngưỡng kỹ thuật cố định cho TOC (ppb) — khớp với toc_cau_hinh.toc_spec_limit_ppb trong Supabase
const TOC_SPEC_LIMIT = 500;

function fmtNum(v, digits = 2) {
  if (v === null || v === undefined || Number.isNaN(v)) return '—';
  return Number(v).toFixed(digits);
}

function fmtDateShort(iso) {
  const d = new Date(iso);
  return d.toLocaleString('vi-VN', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

// ============================================================
// HOOK: quản lý phiên đăng nhập Supabase Auth
// ============================================================
function useSupabaseSession() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;

    supabase.auth.getSession().then(({ data }) => {
      if (cancelled) return;
      setSession(data.session);
      setLoading(false);
    });

    const { data: listener } = supabase.auth.onAuthStateChange((_event, newSession) => {
      setSession(newSession);
      setLoading(false);
    });

    return () => {
      cancelled = true;
      listener.subscription.unsubscribe();
    };
  }, []);

  return { session, loading };
}

// ============================================================
// HOOK: lấy dữ liệu THÔ (1 điểm đo/phút) theo khoảng thời gian
// Tự phân trang để vượt giới hạn mặc định 1000 dòng/request của PostgREST
// ============================================================
async function fetchAllRows(uuid, fromIso, toIso, accessToken) {
  const PAGE_SIZE = 1000;
  let allRows = [];
  let offset = 0;
  const headers = buildHeaders(accessToken);
  while (true) {
    const url = `${REST_BASE}/toc_data_raw?uuid=eq.${encodeURIComponent(uuid)}` +
      `&device_timestamp=gte.${encodeURIComponent(fromIso)}` +
      `&device_timestamp=lte.${encodeURIComponent(toIso)}` +
      `&order=device_timestamp.asc&limit=${PAGE_SIZE}&offset=${offset}`;
    const res = await fetch(url, { headers });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`HTTP ${res.status}: ${txt.slice(0, 200)}`);
    }
    const rows = await res.json();
    allRows = allRows.concat(rows);
    if (rows.length < PAGE_SIZE) break; // hết dữ liệu
    offset += PAGE_SIZE;
    if (offset > 200000) break; // an toàn, tránh lặp vô hạn nếu có lỗi
  }
  return allRows;
}

function useRawData(uuid, fromIso, toIso, accessToken) {
  const [rawRows, setRawRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);
  const [loadedCount, setLoadedCount] = useState(0);

  const refresh = useCallback(() => setRefreshKey(k => k + 1), []);

  useEffect(() => {
    if (!uuid || !accessToken) return;
    let cancelled = false;
    setLoading(true);
    setError(null);
    setLoadedCount(0);

    fetchAllRows(uuid, fromIso, toIso, accessToken)
      .then((rows) => {
        if (cancelled) return;
        setRawRows(rows);
        setLoadedCount(rows.length);
        setLoading(false);
      })
      .catch((err) => {
        if (cancelled) return;
        setError(err.message || String(err));
        setLoading(false);
      });

    return () => { cancelled = true; };
  }, [uuid, fromIso, toIso, accessToken, refreshKey]);

  return { rawRows, loading, error, refresh, loadedCount };
}

// Map field tên cột raw theo (water_type, metric)
const RAW_FIELD_MAP = {
  distilled_toc: 'dw_toc',
  distilled_conductivity: 'dw_conductivity',
  distilled_temperature: 'dw_temperature',
  purified_toc: 'pw_toc',
  purified_conductivity: 'pw_conductivity',
  purified_temperature: 'pw_temperature',
};

// Tính số điểm "kỳ vọng" trong khoảng thời gian (1 điểm/phút)
function expectedCount(fromIso, toIso) {
  const ms = new Date(toIso).getTime() - new Date(fromIso).getTime();
  return Math.max(1, Math.round(ms / 60000));
}

// ============================================================
// HOOK: lấy danh sách devices
// ============================================================
function useDevices(accessToken) {
  const [devices, setDevices] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    if (!accessToken) return;
    setLoading(true);
    fetch(`${REST_BASE}/toc_devices?select=*&order=location_name.asc`, { headers: buildHeaders(accessToken) })
      .then(async (res) => {
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`HTTP ${res.status}: ${txt.slice(0, 200)}`);
        }
        return res.json();
      })
      .then((rows) => { setDevices(rows); setLoading(false); })
      .catch((err) => { setError(err.message || String(err)); setLoading(false); });
  }, [accessToken]);

  return { devices, loading, error };
}

// ============================================================
// Trích danh sách điểm {time, value} cho 1 (water_type, metric) từ rawRows
// ============================================================
function extractSeries(rawRows, waterType, metricKey) {
  const field = RAW_FIELD_MAP[`${waterType}_${metricKey}`];
  const points = [];
  for (const r of rawRows) {
    const v = r[field];
    points.push({
      time: r.device_timestamp,
      timeMs: new Date(r.device_timestamp).getTime(),
      timeLabel: fmtDateShort(r.device_timestamp),
      value: (v === null || v === undefined) ? null : Number(v),
    });
  }
  return points;
}

// ============================================================
// Tính percentile tuyến tính (giống PERCENTILE_CONT của Postgres)
// ============================================================
function percentile(sortedArr, p) {
  if (!sortedArr.length) return null;
  const idx = (sortedArr.length - 1) * p;
  const lo = Math.floor(idx);
  const hi = Math.ceil(idx);
  if (lo === hi) return sortedArr[lo];
  return sortedArr[lo] + (sortedArr[hi] - sortedArr[lo]) * (idx - lo);
}

// ============================================================
// Tính thống kê tổng hợp trực tiếp từ mảng điểm thô {time, value}
// ============================================================
function aggregateStatsRaw(allPoints, specLimit) {
  if (!allPoints || !allPoints.length) return null;

  const totalRows = allPoints.length;
  const values = allPoints.map(p => p.value).filter(v => v !== null && !Number.isNaN(v));
  const n = values.length;
  if (n === 0) return null;

  const sorted = [...values].sort((a, b) => a - b);
  const min = sorted[0];
  const max = sorted[n - 1];
  const mean = values.reduce((a, b) => a + b, 0) / n;
  const variance = n > 1 ? values.reduce((s, v) => s + (v - mean) ** 2, 0) / (n - 1) : 0;
  const sd = Math.sqrt(variance);
  const q1 = percentile(sorted, 0.25);
  const q3 = percentile(sorted, 0.75);

  const specViolations = (specLimit !== null && specLimit !== undefined)
    ? values.filter(v => v > specLimit).length : 0;

  const missingRows = totalRows - n;
  const missRate = totalRows > 0 ? (missingRows / totalRows) * 100 : null;

  return {
    min, max, mean, sd, q1, q3,
    iqr: (q1 !== null && q3 !== null) ? q3 - q1 : null,
    missRate: missRate !== null ? Math.max(0, missRate) : null,
    totalPoints: n,
    totalRows,
    missingRows,
    specViolations,
    specLimit: specLimit ?? null,
    ucl: mean + 3 * sd,
    lcl: mean - 3 * sd,
  };
}

// ============================================================
// COMPONENT: Card thống kê
// ============================================================
function StatCard({ label, value, unit, highlight }) {
  return h('div', {
    style: { background: '#fff', border: '1px solid #e2e8f0', borderRadius: 8, padding: '10px 14px', minWidth: 92, flex: '1 1 92px' }
  },
    h('div', { style: { fontSize: 11, color: '#64748b', fontWeight: 600, letterSpacing: '0.02em', textTransform: 'uppercase' } }, label),
    h('div', {
      style: { fontFamily: "'JetBrains Mono', 'Courier New', monospace", fontSize: 20, fontWeight: 700, marginTop: 2, color: highlight || '#0f172a' }
    },
      value,
      unit ? h('span', { style: { fontSize: 12, fontWeight: 500, color: '#64748b', marginLeft: 3 } }, unit) : null
    )
  );
}

// ============================================================
// COMPONENT: Khối biểu đồ cho 1 (water_type, metric)
// ============================================================
function MetricBlock({ waterType, metric, points, specLimit, loading }) {
  const stats = useMemo(() => aggregateStatsRaw(points, metric.hasSpec ? specLimit : null), [points, specLimit]);

  const chartData = useMemo(() => {
    if (!points || !stats) return [];
    return points.filter(p => p.value !== null).map(p => ({
      time: p.time,
      timeMs: p.timeMs,
      timeLabel: p.timeLabel,
      value: p.value,
      ucl: stats.ucl,
      lcl: stats.lcl,
      violation: (metric.hasSpec && specLimit !== null && p.value > specLimit) ? p.value : null,
    }));
  }, [points, stats, metric.hasSpec, specLimit]);

  const timeDomain = useMemo(() => {
    if (!chartData.length) return [0, 1];
    return [chartData[0].timeMs, chartData[chartData.length - 1].timeMs];
  }, [chartData]);

  const tickFormatterTime = (ms) => {
    const d = new Date(ms);
    return d.toLocaleString('vi-VN', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  };

  const hasData = chartData.length > 0 && stats;

  const statCards = [
    h(StatCard, { key: 'min', label: 'Min', value: fmtNum(stats?.min), unit: metric.unit }),
    h(StatCard, { key: 'max', label: 'Max', value: fmtNum(stats?.max), unit: metric.unit }),
    h(StatCard, { key: 'mean', label: 'Trung bình', value: fmtNum(stats?.mean), unit: metric.unit }),
    h(StatCard, { key: 'sd', label: 'Độ lệch chuẩn', value: fmtNum(stats?.sd), unit: metric.unit }),
    h(StatCard, { key: 'q1', label: 'Q1', value: fmtNum(stats?.q1), unit: metric.unit }),
    h(StatCard, { key: 'q3', label: 'Q3', value: fmtNum(stats?.q3), unit: metric.unit }),
    h(StatCard, { key: 'iqr', label: 'IQR', value: fmtNum(stats?.iqr), unit: metric.unit }),
    h(StatCard, {
      key: 'miss', label: '% Thiếu dữ liệu', value: fmtNum(stats?.missRate, 1),
      unit: stats ? `% (${stats.missingRows}/${stats.totalRows} dòng)` : '%',
      highlight: stats && stats.missRate > 10 ? '#dc2626' : (stats && stats.missRate > 2 ? '#d97706' : '#16a34a')
    }),
  ];
  if (metric.hasSpec && stats) {
    statCards.push(h(StatCard, {
      key: 'spec', label: 'Vi phạm Spec', value: stats.specViolations, unit: `/ ${stats.totalPoints} điểm`,
      highlight: stats.specViolations > 0 ? '#dc2626' : '#16a34a'
    }));
  }

  return h('div', { style: { background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: 12, padding: 20, marginBottom: 20 } },
    h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 } },
      h('h3', { style: { margin: 0, fontSize: 15, fontWeight: 700, color: '#0f172a' } }, metric.label),
      h('span', { style: { fontSize: 12, color: '#94a3b8' } }, `(${metric.unit})`),
      stats && stats.specViolations > 0 ? h('span', {
        style: { display: 'inline-flex', alignItems: 'center', gap: 4, background: '#fef2f2', color: '#dc2626', fontSize: 11, fontWeight: 700, padding: '2px 8px', borderRadius: 999, marginLeft: 'auto' }
      }, `⚠ ${stats.specViolations} vi phạm spec`) : null
    ),

    loading ? h('div', { style: { color: '#94a3b8', fontSize: 13, padding: 20, textAlign: 'center' } }, 'Đang tải dữ liệu...') : null,

    (!loading && !hasData) ? h('div', { style: { color: '#94a3b8', fontSize: 13, padding: 20, textAlign: 'center' } }, 'Không có dữ liệu trong khoảng thời gian này.') : null,

    (!loading && hasData) ? h(Fragment, null,
      h('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 } }, statCards),

      h('div', { style: { marginBottom: 18 } },
        h('div', { style: { fontSize: 12, fontWeight: 600, color: '#475569', marginBottom: 6 } }, `Xu hướng theo thời gian (từng điểm đo thật, 1 phút/lần — ${stats.totalPoints.toLocaleString('vi-VN')} điểm)`),
        h(ResponsiveContainer, { width: '100%', height: 220 },
          h(LineChart, { data: chartData, margin: { top: 5, right: 10, left: 0, bottom: 0 } },
            h(CartesianGrid, { strokeDasharray: '3 3', stroke: '#e2e8f0' }),
            h(XAxis, {
              dataKey: 'timeMs', type: 'number', domain: timeDomain, scale: 'time',
              tickFormatter: tickFormatterTime,
              tick: { fontSize: 10, fill: '#94a3b8' }, minTickGap: 60
            }),
            h(YAxis, { tick: { fontSize: 10, fill: '#94a3b8' }, width: 45, domain: ['auto', 'auto'] }),
            h(Tooltip, {
              contentStyle: { fontSize: 12, borderRadius: 8, border: '1px solid #e2e8f0' },
              labelFormatter: (ms) => tickFormatterTime(ms),
              formatter: (v) => [fmtNum(v), metric.unit]
            }),
            (metric.hasSpec && stats.specLimit !== null) ? h(ReferenceLine, {
              y: stats.specLimit, stroke: '#dc2626', strokeDasharray: '4 4',
              label: { value: `Spec limit: ${stats.specLimit}`, position: 'insideTopRight', fontSize: 10, fill: '#dc2626' }
            }) : null,
            h(Line, { type: 'monotone', dataKey: 'value', stroke: waterType.accent, strokeWidth: 1, dot: false, name: 'Giá trị', isAnimationActive: false, connectNulls: false })
          )
        )
      ),

      h('div', null,
        h('div', { style: { fontSize: 12, fontWeight: 600, color: '#475569', marginBottom: 6 } }, 'Biểu đồ kiểm soát (Control Chart — UCL/LCL = mean ± 3σ, tính trên toàn bộ khoảng đã chọn)'),
        h(ResponsiveContainer, { width: '100%', height: 220 },
          h(ComposedChart, { data: chartData, margin: { top: 5, right: 10, left: 0, bottom: 0 } },
            h(CartesianGrid, { strokeDasharray: '3 3', stroke: '#e2e8f0' }),
            h(XAxis, {
              dataKey: 'timeMs', type: 'number', domain: timeDomain, scale: 'time',
              tickFormatter: tickFormatterTime,
              tick: { fontSize: 10, fill: '#94a3b8' }, minTickGap: 60
            }),
            h(YAxis, { tick: { fontSize: 10, fill: '#94a3b8' }, width: 45, domain: ['auto', 'auto'] }),
            h(Tooltip, {
              contentStyle: { fontSize: 12, borderRadius: 8, border: '1px solid #e2e8f0' },
              labelFormatter: (ms) => tickFormatterTime(ms),
              formatter: (v, name) => [fmtNum(v), name]
            }),
            h(Line, { type: 'monotone', dataKey: 'ucl', stroke: '#f59e0b', strokeWidth: 1.5, dot: false, name: 'UCL', strokeDasharray: '5 3', isAnimationActive: false }),
            h(Line, { type: 'monotone', dataKey: 'lcl', stroke: '#f59e0b', strokeWidth: 1.5, dot: false, name: 'LCL', strokeDasharray: '5 3', isAnimationActive: false }),
            h(Line, { type: 'monotone', dataKey: 'value', stroke: waterType.accent, strokeWidth: 1, dot: false, name: 'Giá trị', isAnimationActive: false, connectNulls: false }),
            metric.hasSpec ? h(Scatter, { dataKey: 'violation', fill: '#dc2626', name: 'Vi phạm Spec', shape: 'diamond' }) : null
          )
        )
      )
    ) : null
  );
}

// ============================================================
// COMPONENT: Header với bộ lọc thời gian
// ============================================================
function FilterBar({ devices, selectedUuid, onSelectUuid, rangeKey, onRangeChange, customFrom, customTo, onCustomChange, onRefresh, loading, onSendReport, reportStatus }) {
  const isCustom = rangeKey === 'custom';

  return h('div', { style: { marginBottom: 0 } },
    h('div', {
      style: { background: '#0f172a', borderRadius: 12, padding: '16px 20px', display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 14 }
    },
      h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, color: '#fff', fontWeight: 700, fontSize: 15, marginRight: 8 } }, '📊 TOC Monitoring'),

      h('select', {
        value: selectedUuid || '',
        onChange: (e) => onSelectUuid(e.target.value),
        style: { background: '#1e293b', color: '#e2e8f0', border: '1px solid #334155', borderRadius: 6, padding: '6px 10px', fontSize: 13 }
      }, devices.map(d => h('option', { key: d.uuid, value: d.uuid }, `${d.location_name || d.model || d.uuid} (${d.uuid})`))),

      h('div', { style: { display: 'flex', gap: 4 } },
        RANGE_PRESETS.map(p => h('button', {
          key: p.key,
          onClick: () => onRangeChange(p.key),
          style: {
            background: rangeKey === p.key ? '#38bdf8' : '#1e293b',
            color: rangeKey === p.key ? '#0f172a' : '#94a3b8',
            border: 'none', borderRadius: 6, padding: '6px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer'
          }
        }, p.label)),
        h('button', {
          onClick: () => onRangeChange('custom'),
          style: {
            background: isCustom ? '#38bdf8' : '#1e293b', color: isCustom ? '#0f172a' : '#94a3b8',
            border: 'none', borderRadius: 6, padding: '6px 10px', fontSize: 12, fontWeight: 600, cursor: 'pointer'
          }
        }, '📅 Tùy chọn')
      ),

      isCustom ? h('div', { style: { display: 'flex', gap: 6, alignItems: 'center' } },
        h('input', {
          type: 'datetime-local', value: customFrom, onChange: (e) => onCustomChange('from', e.target.value),
          style: { background: '#1e293b', color: '#e2e8f0', border: '1px solid #334155', borderRadius: 6, padding: '5px 8px', fontSize: 12 }
        }),
        h('span', { style: { color: '#64748b', fontSize: 12 } }, '→'),
        h('input', {
          type: 'datetime-local', value: customTo, onChange: (e) => onCustomChange('to', e.target.value),
          style: { background: '#1e293b', color: '#e2e8f0', border: '1px solid #334155', borderRadius: 6, padding: '5px 8px', fontSize: 12 }
        })
      ) : null,

      h('button', {
        onClick: onRefresh,
        style: {
          marginLeft: 'auto', background: '#1e293b', color: '#38bdf8', border: '1px solid #334155',
          borderRadius: 6, padding: '6px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer'
        },
        className: loading ? 'spin' : ''
      }, loading ? '⏳ Đang tải...' : '🔄 Tải lại'),

      h('button', {
        onClick: onSendReport,
        disabled: reportStatus.sending,
        style: {
          background: '#16a34a', color: '#fff', border: 'none',
          borderRadius: 6, padding: '6px 14px', fontSize: 12, fontWeight: 700,
          cursor: reportStatus.sending ? 'not-allowed' : 'pointer',
          opacity: reportStatus.sending ? 0.6 : 1
        }
      }, reportStatus.sending ? '⏳ Đang gửi...' : '📧 Gửi báo cáo')
    ),

    reportStatus.message ? h('div', {
      style: {
        marginTop: 10, padding: '10px 14px', borderRadius: 8, fontSize: 13,
        background: reportStatus.success ? '#f0fdf4' : '#fef2f2',
        color: reportStatus.success ? '#16a34a' : '#dc2626',
        border: `1px solid ${reportStatus.success ? '#bbf7d0' : '#fecaca'}`
      }
    }, reportStatus.message) : null
  );
}

// ============================================================
// COMPONENT: thanh tài khoản (email + đổi mật khẩu + đăng xuất)
// ============================================================
function AccountBar({ email, onLogout, onOpenChangePassword, loggingOut }) {
  return h('div', {
    style: {
      display: 'flex', alignItems: 'center', gap: 12, justifyContent: 'flex-end',
      padding: '8px 4px', marginBottom: 16, fontSize: 12.5, color: '#64748b'
    }
  },
    h('span', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
      h('span', { style: { width: 6, height: 6, borderRadius: '50%', background: '#16a34a', display: 'inline-block' } }),
      h('span', null, email)
    ),
    h('button', {
      onClick: onOpenChangePassword,
      style: { background: 'none', border: 'none', color: '#2563eb', fontSize: 12.5, cursor: 'pointer', fontWeight: 600, padding: 0 }
    }, 'Đổi mật khẩu'),
    h('button', {
      onClick: onLogout,
      disabled: loggingOut,
      style: { background: 'none', border: 'none', color: '#dc2626', fontSize: 12.5, cursor: 'pointer', fontWeight: 600, padding: 0 }
    }, loggingOut ? 'Đang đăng xuất...' : 'Đăng xuất')
  );
}

// ============================================================
// COMPONENT: modal đổi mật khẩu
// ============================================================
function ChangePasswordModal({ onClose }) {
  const [pw1, setPw1] = useState('');
  const [pw2, setPw2] = useState('');
  const [error, setError] = useState('');
  const [saving, setSaving] = useState(false);
  const [done, setDone] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError('');
    if (pw1.length < 6) { setError('Mật khẩu phải có ít nhất 6 ký tự.'); return; }
    if (pw1 !== pw2) { setError('Mật khẩu nhập lại không khớp.'); return; }
    setSaving(true);
    const { error: err } = await supabase.auth.updateUser({ password: pw1 });
    setSaving(false);
    if (err) { setError(err.message); return; }
    setDone(true);
  };

  const inputStyle = { width: '100%', boxSizing: 'border-box', border: '1px solid #cbd5e1', borderRadius: 8, padding: '9px 11px', fontSize: 13.5, marginTop: 4 };
  const labelStyle = { fontSize: 12.5, fontWeight: 600, color: '#334155' };

  return h('div', {
    style: {
      position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.55)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, padding: 16
    },
    onClick: onClose
  },
    h('div', {
      style: { background: '#fff', borderRadius: 14, padding: '24px 24px', width: '100%', maxWidth: 340, boxShadow: '0 20px 60px rgba(0,0,0,0.35)' },
      onClick: (e) => e.stopPropagation()
    },
      h('div', { style: { fontWeight: 800, fontSize: 15, color: '#0f172a', marginBottom: 16 } }, '🔒 Đổi mật khẩu'),

      done
        ? h(Fragment, null,
            h('div', { style: { background: '#f0fdf4', color: '#16a34a', fontSize: 13, padding: '10px 12px', borderRadius: 8, marginBottom: 16 } }, '✅ Đổi mật khẩu thành công.'),
            h('button', {
              onClick: onClose,
              style: { width: '100%', background: '#0f172a', color: '#fff', border: 'none', borderRadius: 8, padding: '10px', fontWeight: 700, fontSize: 13.5, cursor: 'pointer' }
            }, 'Đóng')
          )
        : h('form', { onSubmit: submit },
            h('label', { style: labelStyle }, 'Mật khẩu mới'),
            h('input', { type: 'password', value: pw1, onChange: e => setPw1(e.target.value), style: inputStyle, placeholder: 'Tối thiểu 6 ký tự', autoFocus: true }),
            h('label', { style: { ...labelStyle, marginTop: 12, display: 'block' } }, 'Nhập lại mật khẩu mới'),
            h('input', { type: 'password', value: pw2, onChange: e => setPw2(e.target.value), style: inputStyle }),
            error ? h('div', { style: { color: '#dc2626', fontSize: 12.5, marginTop: 10, background: '#fef2f2', padding: '8px 10px', borderRadius: 6 } }, error) : null,
            h('div', { style: { display: 'flex', gap: 8, marginTop: 18 } },
              h('button', {
                type: 'button', onClick: onClose,
                style: { flex: 1, background: '#f1f5f9', color: '#475569', border: 'none', borderRadius: 8, padding: '10px', fontWeight: 600, fontSize: 13.5, cursor: 'pointer' }
              }, 'Hủy'),
              h('button', {
                type: 'submit', disabled: saving,
                style: { flex: 1, background: '#0f172a', color: '#fff', border: 'none', borderRadius: 8, padding: '10px', fontWeight: 700, fontSize: 13.5, cursor: saving ? 'not-allowed' : 'pointer', opacity: saving ? 0.7 : 1 }
              }, saving ? 'Đang lưu...' : 'Lưu mật khẩu')
            )
          )
    )
  );
}

// ============================================================
// COMPONENT: màn hình đăng nhập
// ============================================================
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [resetSent, setResetSent] = useState(false);

  const inputStyle = { width: '100%', boxSizing: 'border-box', border: '1px solid #cbd5e1', borderRadius: 8, padding: '10px 12px', fontSize: 14, marginTop: 4 };
  const labelStyle = { fontSize: 12.5, fontWeight: 600, color: '#334155' };

  const submit = async (e) => {
    e.preventDefault();
    setError('');
    setResetSent(false);
    setLoading(true);
    const { error: err } = await supabase.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (err) {
      setError(err.message === 'Invalid login credentials' ? 'Sai email hoặc mật khẩu.' : err.message);
    }
    // Đăng nhập thành công -> onAuthStateChange ở component gốc sẽ tự chuyển màn hình
  };

  const handleReset = async () => {
    if (!email) { setError('Nhập email của bạn trước khi bấm "Quên mật khẩu?".'); return; }
    setError('');
    setLoading(true);
    const { error: err } = await supabase.auth.resetPasswordForEmail(email);
    setLoading(false);
    if (err) { setError(err.message); return; }
    setResetSent(true);
  };

  return h('div', {
    style: { minHeight: '100vh', background: '#0f172a', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }
  },
    h('form', {
      onSubmit: submit,
      style: { background: '#fff', borderRadius: 14, padding: '32px 28px', width: '100%', maxWidth: 360, boxShadow: '0 20px 60px rgba(0,0,0,0.35)' }
    },
      h('div', { style: { textAlign: 'center', marginBottom: 22 } },
        h('div', { style: { fontSize: 28, marginBottom: 6 } }, '📊'),
        h('div', { style: { fontWeight: 800, fontSize: 17, color: '#0f172a' } }, 'TOC Monitoring Dashboard'),
        h('div', { style: { fontSize: 12, color: '#94a3b8', marginTop: 4 } }, 'Đăng nhập để tiếp tục')
      ),

      h('label', { style: labelStyle }, 'Email'),
      h('input', {
        type: 'email', required: true, value: email, onChange: e => setEmail(e.target.value),
        style: inputStyle, placeholder: 'ban@congty.com', autoFocus: true
      }),

      h('label', { style: { ...labelStyle, marginTop: 12, display: 'block' } }, 'Mật khẩu'),
      h('input', {
        type: 'password', required: true, value: password, onChange: e => setPassword(e.target.value),
        style: inputStyle, placeholder: '••••••••'
      }),

      error ? h('div', { style: { color: '#dc2626', fontSize: 12.5, marginTop: 10, background: '#fef2f2', padding: '8px 10px', borderRadius: 6 } }, error) : null,
      resetSent ? h('div', { style: { color: '#16a34a', fontSize: 12.5, marginTop: 10, background: '#f0fdf4', padding: '8px 10px', borderRadius: 6 } }, '✅ Nếu email tồn tại trong hệ thống, một email đặt lại mật khẩu đã được gửi.') : null,

      h('button', {
        type: 'submit', disabled: loading,
        style: {
          marginTop: 16, width: '100%', background: '#0f172a', color: '#fff', border: 'none',
          borderRadius: 8, padding: '11px', fontWeight: 700, fontSize: 14,
          cursor: loading ? 'not-allowed' : 'pointer', opacity: loading ? 0.7 : 1
        }
      }, loading ? 'Đang đăng nhập...' : 'Đăng nhập'),

      h('button', {
        type: 'button', onClick: handleReset, disabled: loading,
        style: { marginTop: 10, width: '100%', background: 'none', border: 'none', color: '#2563eb', fontSize: 12.5, cursor: 'pointer', padding: 6 }
      }, 'Quên mật khẩu?'),

      h('div', { style: { textAlign: 'center', fontSize: 11, color: '#94a3b8', marginTop: 14 } }, 'Tài khoản do quản trị viên hệ thống cấp. Liên hệ quản trị viên nếu bạn chưa có tài khoản.')
    )
  );
}

// ============================================================
// APP CHÍNH (sau khi đã đăng nhập)
// ============================================================
function TocDashboard({ session, onLogout }) {
  const accessToken = session.access_token;
  const userEmail = session.user?.email || '';

  const { devices, loading: devicesLoading, error: devicesError } = useDevices(accessToken);
  const [selectedUuid, setSelectedUuid] = useState(null);
  const [rangeKey, setRangeKey] = useState('24h');
  const [customFrom, setCustomFrom] = useState('');
  const [customTo, setCustomTo] = useState('');
  const [showChangePw, setShowChangePw] = useState(false);
  const [loggingOut, setLoggingOut] = useState(false);

  useEffect(() => {
    if (devices.length && !selectedUuid) setSelectedUuid(devices[0].uuid);
  }, [devices, selectedUuid]);

  const { fromIso, toIso } = useMemo(() => {
    if (rangeKey === 'custom' && customFrom && customTo) {
      return { fromIso: new Date(customFrom).toISOString(), toIso: new Date(customTo).toISOString() };
    }
    const preset = RANGE_PRESETS.find(p => p.key === rangeKey) || RANGE_PRESETS[0];
    const to = new Date();
    const from = new Date(to.getTime() - preset.hours * 3600 * 1000);
    return { fromIso: from.toISOString(), toIso: to.toISOString() };
  }, [rangeKey, customFrom, customTo]);

  const { rawRows, loading, error, refresh, loadedCount } = useRawData(selectedUuid, fromIso, toIso, accessToken);
  const expCount = useMemo(() => expectedCount(fromIso, toIso), [fromIso, toIso]);

  const [reportStatus, setReportStatus] = useState({ sending: false, success: null, message: '' });

  const handleSendReport = useCallback(async () => {
    setReportStatus({ sending: true, success: null, message: '' });
    try {
      const res = await fetch(N8N_REPORT_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fromDate: fromIso, toDate: toIso, uuid: selectedUuid })
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`HTTP ${res.status}: ${txt.slice(0, 200)}`);
      }
      const data = await res.json();
      setReportStatus({
        sending: false, success: true,
        message: `✅ ${data.message || 'Đã gửi báo cáo thành công.'}`
      });
    } catch (err) {
      setReportStatus({
        sending: false, success: false,
        message: `❌ Gửi báo cáo thất bại: ${err.message || String(err)}`
      });
    }
  }, [fromIso, toIso, selectedUuid]);

  const handleLogout = useCallback(async () => {
    setLoggingOut(true);
    await supabase.auth.signOut();
    // onAuthStateChange ở component gốc sẽ tự chuyển về màn hình đăng nhập
  }, []);

  const seriesByKey = useMemo(() => {
    const result = {};
    for (const wt of WATER_TYPES) {
      for (const m of METRICS) {
        result[`${wt.key}_${m.key}`] = extractSeries(rawRows, wt.key, m.key);
      }
    }
    return result;
  }, [rawRows]);

  const handleCustomChange = (which, val) => {
    if (which === 'from') setCustomFrom(val);
    else setCustomTo(val);
  };

  const waterSections = selectedUuid ? WATER_TYPES.map(wt =>
    h('div', { key: wt.key, style: { marginBottom: 32 } },
      h('h2', {
        style: { display: 'flex', alignItems: 'center', gap: 8, fontSize: 18, fontWeight: 800, color: wt.accent, borderBottom: `2px solid ${wt.accent}`, paddingBottom: 8, marginBottom: 16 }
      }, wt.label),
      METRICS.map(m => h(MetricBlock, {
        key: `${wt.key}_${m.key}`, waterType: wt, metric: m,
        points: seriesByKey[`${wt.key}_${m.key}`],
        specLimit: TOC_SPEC_LIMIT, loading
      }))
    )
  ) : null;

  const bigRangeWarning = (rangeKey === '7d' || rangeKey === '30d' || (rangeKey === 'custom' && expCount > 24 * 60 * 3))
    ? h('div', { style: { background: '#fffbeb', color: '#b45309', padding: '10px 14px', borderRadius: 8, marginBottom: 16, fontSize: 12 } },
        `⏳ Khoảng thời gian dài (~${expCount.toLocaleString('vi-VN')} điểm kỳ vọng/thông số) — biểu đồ vẽ từng điểm thật có thể tải chậm vài giây.`)
    : null;

  return h('div', { style: { background: '#fff', minHeight: '100vh', padding: 20, color: '#0f172a' } },
    h(AccountBar, {
      email: userEmail, onLogout: handleLogout, loggingOut,
      onOpenChangePassword: () => setShowChangePw(true)
    }),

    h(FilterBar, {
      devices, selectedUuid, onSelectUuid: setSelectedUuid,
      rangeKey, onRangeChange: setRangeKey,
      customFrom, customTo, onCustomChange: handleCustomChange,
      onRefresh: refresh, loading,
      onSendReport: handleSendReport, reportStatus
    }),

    h('div', { style: { marginTop: 20 } },
      bigRangeWarning,
      devicesError ? h('div', { style: { background: '#fef2f2', color: '#dc2626', padding: 12, borderRadius: 8, marginBottom: 16, fontSize: 13 } }, `Lỗi tải danh sách thiết bị: ${devicesError}`) : null,
      error ? h('div', { style: { background: '#fef2f2', color: '#dc2626', padding: 12, borderRadius: 8, marginBottom: 16, fontSize: 13 } }, `Lỗi tải dữ liệu: ${error}`) : null,
      devicesLoading ? h('div', { style: { textAlign: 'center', color: '#94a3b8', padding: 40 } }, 'Đang tải danh sách thiết bị...') : null,
      (!devicesLoading && devices.length === 0 && !devicesError) ? h('div', { style: { textAlign: 'center', color: '#94a3b8', padding: 40 } }, 'Chưa có thiết bị nào trong hệ thống. Hãy chạy workflow đồng bộ devices trước.') : null,
      (!loading && loadedCount > 0) ? h('div', { style: { fontSize: 11, color: '#94a3b8', marginBottom: 12 } }, `Đã tải ${loadedCount.toLocaleString('vi-VN')} điểm đo thô từ ${fmtDateShort(fromIso)} đến ${fmtDateShort(toIso)}`) : null,

      waterSections,

      h('div', { style: { textAlign: 'center', color: '#cbd5e1', fontSize: 11, marginTop: 20, paddingTop: 16, borderTop: '1px solid #f1f5f9' } }, 'Dữ liệu thô (1 phút/lần) từ Supabase · Cập nhật tự động mỗi giờ qua n8n')
    ),

    showChangePw ? h(ChangePasswordModal, { onClose: () => setShowChangePw(false) }) : null
  );
}

// ============================================================
// ROOT: kiểm tra phiên đăng nhập trước khi hiện dashboard
// ============================================================
function Root() {
  const { session, loading } = useSupabaseSession();

  if (loading) {
    return h('div', {
      style: { minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#94a3b8', fontSize: 13 }
    }, 'Đang kiểm tra đăng nhập...');
  }

  if (!session) {
    return h(LoginScreen);
  }

  return h(TocDashboard, { session });
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(Root));
</script>
